<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tasks Manager</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body class="bg-green-50 text-gray-800">

<!-- TOPBAR -->
<div id="topbar" class="hidden bg-green-600 text-white px-6 py-4 flex justify-between items-center shadow">

    <div class="flex items-center gap-3">
        <button id="backBtn" onclick="back()" class="hidden bg-green-500 px-3 py-1 rounded hover:bg-green-400">
            ← Back
        </button>
        <h1 class="font-bold text-xl">Tasks Manager</h1>
    </div>

    <div class="flex items-center gap-4">
        <span id="userEmail" class="text-sm"></span>
        <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">Logout</button>
    </div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="fixed inset-0 flex items-center justify-center bg-gradient-to-br from-green-500 to-emerald-400">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-[320px]">
        <h1 class="text-2xl font-bold text-center mb-2 text-green-600">Tasks Manager</h1>
        <p class="text-center text-gray-500 mb-6">Plan your time like a pro</p>

        <input id="email" placeholder="Email" class="w-full mb-3 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-400">
        <input id="password" type="password" placeholder="Password" class="w-full mb-4 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-400">

        <div class="flex gap-2">
            <button onclick="login()" class="flex-1 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">
                Login
            </button>
            <button onclick="register()" class="flex-1 bg-green-100 py-2 rounded-lg hover:bg-green-200">
                Register
            </button>
        </div>
    </div>

</div>

<!-- TASKS -->
<div id="tasks-screen" class="hidden max-w-4xl mx-auto mt-8 bg-white p-6 rounded-2xl shadow">

    <div class="flex gap-2 mb-4">
        <button onclick="showAdd()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
            + Add
        </button>
        <button onclick="showCalendar()" class="bg-green-100 px-4 py-2 rounded-lg hover:bg-green-200">
            Calendar
        </button>
    </div>

    <div id="tasks"></div>
</div>

<!-- ADD -->
<div id="add-screen" class="hidden max-w-xl mx-auto mt-8 bg-white p-6 rounded-2xl shadow">

    <h2 class="text-lg font-bold mb-4 text-green-600">Add Task</h2>

    <input id="taskTitle" placeholder="Title" class="w-full mb-3 px-3 py-2 border rounded-lg">
    <input id="taskDesc" placeholder="Description" class="w-full mb-3 px-3 py-2 border rounded-lg">
    <input id="taskDate" type="date" class="w-full mb-3 px-3 py-2 border rounded-lg">

    <div class="flex gap-2 mb-3">
        <select id="startHour" class="flex-1 border rounded p-2"></select>
        <select id="startMinute" class="flex-1 border rounded p-2"></select>
    </div>

    <div class="flex gap-2 mb-4">
        <select id="endHour" class="flex-1 border rounded p-2"></select>
        <select id="endMinute" class="flex-1 border rounded p-2"></select>
    </div>

    <button onclick="createTask()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
        Save
    </button>
</div>

<!-- EDIT -->
<div id="task-screen" class="hidden max-w-xl mx-auto mt-8 bg-white p-6 rounded-2xl shadow">

    <h2 class="text-lg font-bold mb-4 text-green-600">Edit Task</h2>

    <input id="editTitle" class="w-full mb-3 px-3 py-2 border rounded-lg">
    <input id="editDesc" class="w-full mb-3 px-3 py-2 border rounded-lg">
    <input id="editDate" type="date" class="w-full mb-3 px-3 py-2 border rounded-lg">

    <div class="flex gap-2 mb-3">
        <select id="editStartHour" class="flex-1 border rounded p-2"></select>
        <select id="editStartMinute" class="flex-1 border rounded p-2"></select>
    </div>

    <div class="flex gap-2 mb-4">
        <select id="editEndHour" class="flex-1 border rounded p-2"></select>
        <select id="editEndMinute" class="flex-1 border rounded p-2"></select>
    </div>

    <div class="flex gap-2">
        <button onclick="saveTask()" class="bg-green-500 text-white px-4 py-2 rounded">
            Save
        </button>

        <button onclick="deleteTask()" class="bg-red-500 text-white px-4 py-2 rounded">
            Delete
        </button>
    </div>

</div>

<!-- CALENDAR -->
<div id="calendar-screen" class="hidden max-w-6xl mx-auto mt-8 bg-white p-4 rounded-2xl shadow">
    <div id="calendar"></div>
</div>

<script>

let token = "";
let tasks = [];
let calendar;

// ===== AUTH =====

async function register(){
    const res = await fetch("/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email.value,password:password.value})
    });
    const data = await res.json();
    if(!res.ok) return alert(data.detail);
    alert("Registered");
}

async function login(){
    const form = new URLSearchParams();
    form.append("username", email.value);
    form.append("password", password.value);

    const res = await fetch("/login",{method:"POST",body:form});
    const data = await res.json();

    if(!res.ok) return alert("Invalid login");

    token = data.access_token;

    document.getElementById("auth-screen").style.display="none";
    document.getElementById("topbar").classList.remove("hidden");

    document.getElementById("userEmail").innerText=email.value;

    showTasks();
}

function logout(){
    token="";
    document.getElementById("auth-screen").style.display="flex";
    document.getElementById("topbar").classList.add("hidden");
}

// ===== NAVIGATION =====

function showBack(v){
    document.getElementById("backBtn").classList.toggle("hidden", !v);
}

function showScreen(id){
    ["tasks-screen","add-screen","calendar-screen","task-screen"].forEach(s=>{
        document.getElementById(s).style.display="none";
    });
    document.getElementById(id).style.display="block";
}

function showTasks(){
    showBack(false);
    showScreen("tasks-screen");
    loadTasks();
}

function showAdd(){
    showBack(true);
    showScreen("add-screen");
    fillTimeSelectors();
}

function showCalendar(){
    showBack(true);
    showScreen("calendar-screen");
    initCalendar();
}

function back(){
    showTasks();
}

// ===== TASKS =====

function getTaskStatusClass(t){
    const now = new Date();
    const start = new Date(t.date + "T" + t.start_time);
    const end = new Date(t.date + "T" + t.end_time);

    if(now >= start && now <= end){
        return "bg-yellow-100 border-yellow-400"; // ongoing
    }
    if(now > end){
        return "bg-gray-100 opacity-60"; // past
    }
    return "bg-white hover:bg-green-50"; // future
}

async function loadTasks(){
    const res = await fetch("/tasks", {
        headers: { Authorization: "Bearer " + token }
    });

    tasks = await res.json();

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    tasks.forEach(t => {
        const cls = getTaskStatusClass(t);

        container.innerHTML += `
        <div onclick='openTask(${JSON.stringify(t)})'
             class="p-3 mb-2 border rounded-lg cursor-pointer ${cls} transition">

            <div class="flex justify-between">
                <span class="font-semibold text-green-700">${t.start_time}</span>
                <span class="text-sm text-gray-500">${t.date}</span>
            </div>

            <div class="font-medium">${t.title}</div>
            <div class="text-sm text-gray-500">${t.description || ""}</div>

        </div>`;
    });
}

// ===== CALENDAR =====

function getEventColor(t){
    const now = new Date();
    const start = new Date(t.date + "T" + t.start_time);
    const end = new Date(t.date + "T" + t.end_time);

    if(now >= start && now <= end){
        return "#f59e0b"; // 🟡 ongoing (amber)
    }
    if(now > end){
        return "#9ca3af"; // ⚪ past (gray)
    }
    return "#16a34a"; // 🟢 future (green)
}

function initCalendar(){

    if(calendar){
        calendar.destroy();
    }

    const calendarEl = document.getElementById('calendar');

    calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        height: 700,

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'timeGridDay,timeGridWeek,dayGridMonth'
        },

        events: tasks.map(t => ({
            title: t.title,
            start: t.date + "T" + t.start_time,
            end: t.date + "T" + t.end_time,
            backgroundColor: getEventColor(t),
            borderColor: getEventColor(t),
            extendedProps: t // 🔥 important
        })),

        nowIndicator: true,
        selectable: true,

        // 🔥 CLICK EVENT → EDIT
        eventClick: function(info){
            const t = info.event.extendedProps;
            openTask(t); // your existing function
        },

        // 🔥 STYLE PAST EVENTS (fade)
        eventDidMount: function(info){
            const t = info.event.extendedProps;

            const now = new Date();
            const end = new Date(t.date + "T" + t.end_time);

            if(now > end){
                info.el.style.opacity = "0.6";
            }
        }
    });

    calendar.render();
}

// ===== TIME =====

function fillTimeSelectors(){
    const hours=[...Array(24).keys()];
    const minutes=[...Array(60).keys()];

    function fill(id,arr){
        const el=document.getElementById(id);
        el.innerHTML="";
        arr.forEach(v=>{
            const val=String(v).padStart(2,'0');
            el.innerHTML+=`<option>${val}</option>`;
        });
    }

    ["startHour","endHour","editStartHour","editEndHour"].forEach(i=>fill(i,hours));
    ["startMinute","endMinute","editStartMinute","editEndMinute"].forEach(i=>fill(i,minutes));
}

// ===== CRUD =====

async function createTask(){
    const start = startHour.value + ":" + startMinute.value;
    const end = endHour.value + ":" + endMinute.value;

    await fetch("/tasks",{
        method:"POST",
        headers:{
            Authorization:"Bearer "+token,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            title:taskTitle.value,
            description:taskDesc.value,
            date:taskDate.value,
            start_time:start,
            end_time:end
        })
    });

    showTasks();
}

let selectedTask = null;

function openTask(t){
    selectedTask = t;

    showBack(true);
    showScreen("task-screen");

    document.getElementById("editTitle").value = t.title;
    document.getElementById("editDesc").value = t.description || "";
    document.getElementById("editDate").value = t.date;

    fillTimeSelectors();

    const [sh, sm] = t.start_time.split(":");
    const [eh, em] = t.end_time.split(":");

    document.getElementById("editStartHour").value = sh;
    document.getElementById("editStartMinute").value = sm;
    document.getElementById("editEndHour").value = eh;
    document.getElementById("editEndMinute").value = em;
}

async function saveTask(){
    const start = editStartHour.value + ":" + editStartMinute.value;
    const end = editEndHour.value + ":" + editEndMinute.value;

    await fetch(`/tasks/${selectedTask.id}`, {
        method: "PUT",
        headers: {
            Authorization: "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: editTitle.value,
            description: editDesc.value,
            date: editDate.value,
            start_time: start,
            end_time: end
        })
    });

    await loadTasks();
    showTasks();
}

async function deleteTask(){
    await fetch(`/tasks/${selectedTask.id}`, {
        method: "DELETE",
        headers: { Authorization: "Bearer " + token }
    });

    await loadTasks();
    showTasks();
}

</script>

</body>
</html>
